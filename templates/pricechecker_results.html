<div id="results-area">
    <div id="results-main">
        <div id="results-mosaic" class="mosaic"></div>

        <div class="badge-count" style="display:none">
            <span>
                <span class="badge-unit"><span class="card-watch-badge inv-count-badge" data-filter="watch" data-tooltip="In your watchlist">WATCH</span><span class="badge-ct">0</span></span>
                <span class="badge-unit"><span class="isrecent-badge inv-count-badge" data-filter="recent" data-tooltip="Last sold within the past 10 days">RECENT</span><span class="badge-ct">0</span></span>
                <span class="badge-unit"><span class="card-old-badge inv-count-badge" data-filter="old" data-tooltip="Last sold over a year ago">OLD</span><span class="badge-ct">0</span></span>
                <span class="badge-unit"><span class="card-low-badge card-low-badge--lowest inv-count-badge" data-filter="lowest" data-tooltip="Only listing on the market">LOWEST</span><span class="badge-ct">0</span></span>
                <span class="badge-unit"><span class="card-low-badge inv-count-badge" data-filter="low" data-tooltip="3 marketplace listings or less">LOW</span><span class="badge-ct">0</span></span>
                <span class="badge-unit"><span class="card-high-badge inv-count-badge" data-filter="high" data-tooltip="5 marketplace listings or more">HIGH</span><span class="badge-ct">0</span></span>
                <span class="badge-unit"><span class="card-high-badge card-high-badge--highest inv-count-badge" data-filter="highest" data-tooltip="10 marketplace listings or more">HIGHEST</span><span class="badge-ct">0</span></span>
                <span class="badge-unit"><span class="card-cheapest-badge inv-count-badge" data-filter="cheapest" data-tooltip="Cheapest listing for its condition">CHEAPEST</span><span class="badge-ct">0</span></span>
                <span class="badge-unit"><span class="card-overpriced-badge inv-count-badge" data-filter="overpriced" data-tooltip="More than 10% above cheapest for its condition">OVERPRICED</span><span class="badge-ct">0</span></span>
            </span>
        </div>

        <div id="pc-list-unsorted" {% if sort_active %}style="display:none"{% endif %}></div>

        <div id="pc-list-sorted" {% if not sort_active %}style="display:none"{% endif %}></div>
    </div>
</div>

<script type="application/json" id="pc-pending-data">{{ pending_releases | tojson }}</script>
<script>
window.PC_PENDING = {
    seller: {{ seller | tojson }},
    sortActive: {{ sort_active | tojson }},
    inventoryCount: {{ inventory_count | tojson }}
};
</script>
