<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title | default('Discogs Toolkit') }}</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <a href="/" class="sidebar-brand">
            {{ logo_svg | safe }}
            <span class="brand-text"><span class="brand-discogs-logo">{{ discogs_logo_svg | safe }}</span>Toolkit</span>
        </a>
        <div class="sidebar-label">♪ Tools ♪</div>
        <a href="/pricechecker"{% if request.path == '/pricechecker' %} class="active"{% endif %}>Price Checker</a>
        <a href="/matcher"{% if request.path == '/matcher' %} class="active"{% endif %}>Matcher</a>
        <a href="/lookup"{% if request.path == '/lookup' %} class="active"{% endif %}>Lookup</a>
        <a href="/records"{% if request.path == '/records' %} class="active"{% endif %}>Records</a>
        {% if request.path != '/' %}
        <div class="sidebar-art">
            <img src="/static/console-oak.png" alt="" class="sidebar-art-img">
            {% if show_platter %}<img src="/static/platter.png" alt="" class="sidebar-platter">{% endif %}
        </div>
        {% endif %}
    </nav>
    <main class="content{% if content_class %} {{ content_class }}{% endif %}">
        <div id="content-main">
            {{ content | safe }}
        </div>
    </main>
</div>
<div id="badge-tooltip"></div>
<script src="/static/js/main.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
